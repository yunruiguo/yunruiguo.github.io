    <circle cx="234" cy="153" r="12"/>
    <circle cx="321" cy="177" r="12"/>
    <circle cx="388" cy="232" r="12"/>
    <circle cx="155" cy="351" r="12"/>
    <circle cx="255" cy="394" r="13"/>
