<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Yunrui Guo personal logo</title>
  <desc id="desc">A circular personal logo with an abstract colorful neural mark and YG initials.</desc>
  <defs>
    <linearGradient id="outer" x1="80" x2="432" y1="64" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.52" stop-color="#d9a441"/>
      <stop offset="1" stop-color="#b95c38"/>
    </linearGradient>
    <radialGradient id="paper" cx="38%" cy="28%" r="72%">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#efe8da"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#182126" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#f5f2ec"/>
  <circle cx="256" cy="256" r="212" fill="url(#paper)" stroke="url(#outer)" stroke-width="18" filter="url(#soft-shadow)"/>
  <circle cx="256" cy="256" r="178" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.72"/>

